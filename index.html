<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L.S.C</title>
  <link rel="stylesheet" href="stylesheet/style.css"/>
</head>
<body>

    <header>
      <span class="h-left">L.S.C</span>
      <span class="h-mid">LINE ◆ OF ◆ SIGHT ◆ CALCULATOR</span>
      <div class="h-right-group">
        <span class="h-right">CS241 ◆ Data Communication And Protocols</span>
        <button class="theme-toggle" id="themeBtn" title="Toggle theme">
          <span class="icon-sun">☀</span>
          <span class="icon-moon">☽</span>
        </button>
      </div>
    </header>

    <div class="page-body">

      <!-- BIG TOWER right -->
      <div class="tower-wrap tower-big">
        <svg class="tower-svg" viewBox="0 0 160 450" xmlns="http://www.w3.org/2000/svg">
          <circle class="beacon-halo" cx="80" cy="13" r="11"/>
          <circle class="beacon-dot"  cx="80" cy="13" r="4.5"/>
          <circle class="ring"    cx="80" cy="13" r="5"/>
          <circle class="ring r2" cx="80" cy="13" r="5"/>
          <circle class="ring r3" cx="80" cy="13" r="5"/>
          <rect class="t-mast" x="78.5" y="20" width="3" height="52" rx="1.5"/>
          <line class="t-struct" x1="80" y1="70"  x2="26"  y2="395"/>
          <line class="t-struct" x1="80" y1="70"  x2="134" y2="395"/>
          <line class="t-struct" x1="46"  y1="165" x2="114" y2="165"/>
          <line class="t-struct" x1="39"  y1="215" x2="121" y2="215"/>
          <line class="t-struct" x1="33"  y1="265" x2="127" y2="265"/>
          <line class="t-struct" x1="28"  y1="315" x2="132" y2="315"/>
          <line class="t-struct" x1="46"  y1="165" x2="114" y2="215"/>
          <line class="t-struct" x1="114" y1="165" x2="46"  y2="215"/>
          <line class="t-struct" x1="39"  y1="215" x2="121" y2="265"/>
          <line class="t-struct" x1="121" y1="215" x2="39"  y2="265"/>
          <line class="t-struct" x1="33"  y1="265" x2="127" y2="315"/>
          <line class="t-struct" x1="127" y1="265" x2="33"  y2="315"/>
          <line class="t-struct" x1="26"  y1="395" x2="134" y2="395"/>
          <line class="t-struct" x1="26"  y1="395" x2="26"  y2="420"/>
          <line class="t-struct" x1="134" y1="395" x2="134" y2="420"/>
          <line class="t-struct" x1="80"  y1="395" x2="80"  y2="420"/>
          <line class="t-struct" x1="16"  y1="420" x2="144" y2="420"/>
        </svg>
      </div>

      <!-- SMALL TOWER left -->
      <div class="tower-wrap tower-small">
        <svg class="tower-svg" viewBox="0 0 160 450" xmlns="http://www.w3.org/2000/svg">
          <circle class="beacon-halo" cx="80" cy="13" r="11"/>
          <circle class="beacon-dot"  cx="80" cy="13" r="4.5"/>
          <circle class="ring"    cx="80" cy="13" r="5"/>
          <circle class="ring r2" cx="80" cy="13" r="5"/>
          <rect class="t-mast" x="78.5" y="20" width="3" height="52" rx="1.5"/>
          <line class="t-struct" x1="80" y1="70"  x2="26"  y2="395"/>
          <line class="t-struct" x1="80" y1="70"  x2="134" y2="395"/>
          <line class="t-struct" x1="46"  y1="165" x2="114" y2="165"/>
          <line class="t-struct" x1="39"  y1="215" x2="121" y2="215"/>
          <line class="t-struct" x1="33"  y1="265" x2="127" y2="265"/>
          <line class="t-struct" x1="28"  y1="315" x2="132" y2="315"/>
          <line class="t-struct" x1="46"  y1="165" x2="114" y2="215"/>
          <line class="t-struct" x1="114" y1="165" x2="46"  y2="215"/>
          <line class="t-struct" x1="39"  y1="215" x2="121" y2="265"/>
          <line class="t-struct" x1="121" y1="215" x2="39"  y2="265"/>
          <line class="t-struct" x1="33"  y1="265" x2="127" y2="315"/>
          <line class="t-struct" x1="127" y1="265" x2="33"  y2="315"/>
          <line class="t-struct" x1="26"  y1="395" x2="134" y2="395"/>
          <line class="t-struct" x1="26"  y1="395" x2="26"  y2="420"/>
          <line class="t-struct" x1="134" y1="395" x2="134" y2="420"/>
          <line class="t-struct" x1="80"  y1="395" x2="80"  y2="420"/>
          <line class="t-struct" x1="16"  y1="420" x2="144" y2="420"/>
        </svg>
      </div>

      <!-- CARD -->
      <div class="card">
        <div class="card-header">
          <h1>Line Of Sight Calculator</h1>
          <p class="subtitle">Enter value, select unit and click on calculate. Result will be displayed.</p>
        </div>

        <div class="section">
          <p class="section-title">Input</p>
          <div class="field">
            <label for="h1">Antenna Height (1<sup>st</sup> Station):</label>
            <input type="number" id="h1" placeholder="" min="0"/>
          </div>
          <div class="field">
            <label for="h2">Antenna Height (2<sup>nd</sup> Station):</label>
            <input type="number" id="h2" placeholder="" min="0"/>
          </div>
          <div class="field">
            <label>Units:</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="inputUnit" value="feet" id="feet"/><span>Feet</span></label>
              <label class="radio-label"><input type="radio" name="inputUnit" value="metres" id="metres" checked/><span>Metres</span></label>
            </div>
          </div>
          <div class="btn-group">
            <button id="calcBtn">Calculate</button>
            <button id="clearBtn">Clear</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="section">
          <p class="section-title">Results</p>
          <div class="field">
            <label>Radio Horizon (1<sup>st</sup> Station):</label>
            <div class="result-box" id="r1">——</div>
          </div>
          <div class="field">
            <label>Radio Horizon (2<sup>nd</sup> Station):</label>
            <div class="result-box" id="r2">——</div>
          </div>
          <div class="field">
            <label>Total Line Of Sight:</label>
            <div class="result-box total" id="total">——</div>
          </div>
          <div class="field">
            <label>Units:</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="outputUnit" value="miles" id="miles"/><span>Miles</span></label>
              <label class="radio-label"><input type="radio" name="outputUnit" value="kilometres" id="kilometres" checked/><span>Kilometres</span></label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <span class="f-left">L.S.C ◆ 2026</span>
      <span class="f-mid">MTI — Faculty of Computers &amp; AI — Dr. Hafez Abd El-Wahab</span>
      <span class="f-right"></span>
    </footer>

  <script src="script.js"></script>
</body>
</html>
